# This file configures the analyzer, which statically analyzes Dart code to
# check for errors, warnings, and lints.
#
# The issues identified by the analyzer are surfaced in the UI of Dart-enabled
# IDEs (https://dart.dev/tools#ides-and-editors). The analyzer can also be
# invoked from the command line by running `flutter analyze`.

# The following line activates a set of recommended lints for Flutter apps,
# packages, and plugins designed to encourage good coding practices.
include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - ARCHIVE/**
    - archived/**
  # Downgrade style-only infos to info level to help reach ≤120 warnings goal
  errors:
    # Downgrade file naming style to info (not warning)
    file_names: info
    # Downgrade other style-only rules to info
    sized_box_for_whitespace: info
    unnecessary_brace_in_string_interps: info
    unnecessary_string_interpolations: info
    unnecessary_to_list_in_spreads: info
    unnecessary_const: info
    use_super_parameters: info
    prefer_final_fields: info
    prefer_final_locals: info

linter:
  # The lint rules applied to this project can be customized in the
  # section below to disable rules from the `package:flutter_lints/flutter.yaml`
  # included above or to enable additional rules. A list of all available lints
  # and their documentation is published at https://dart.dev/lints.
  #
  # Instead of disabling a lint rule for the entire project in the
  # section below, it can also be suppressed for a single line of code
  # or a specific dart file by using the `// ignore: name_of_lint` and
  # `// ignore_for_file: name_of_lint` syntax on the line or in the file
  # producing the lint.
  rules:
    # Enable specific rules for Sprint I
    prefer_const_constructors: true
    prefer_final_locals: true
    avoid_print: true
    unawaited_futures: true
    use_build_context_synchronously: true
    # Keep existing rules
    prefer_single_quotes: true

# ---------------------------------------------------------------------------
# PRISM token enforcement (enforced in CI via .github/workflows/prism.yml)
# ---------------------------------------------------------------------------
# The following patterns are BANNED outside of lib/theme/:
#
#   Color(0xFF…)          — use DesignTokens color constants instead
#   TextStyle(fontSize:…) — use DesignTokens text style constants instead
#   EdgeInsets.all(N)     — use DesignTokens.spaceN constants instead
#   EdgeInsets.symmetric(…numeric…)
#   EdgeInsets.only(…numeric…)
#
# Dart's built-in linter cannot currently enforce these patterns natively.
# PRISM's token_lint CI job (prism.yml) runs grep-based checks on every PR
# and blocks merge if violations are found.
#
# To suppress a legitimate exception (e.g. a one-off animation value that
# genuinely has no token equivalent), add an inline comment:
#   // prism-token-exempt: <reason>
# PRISM will audit exemptions during code review.
# ---------------------------------------------------------------------------

# Additional information about this file can be found at
# https://dart.dev/guides/language/analysis-options
